server {
  listen 5173;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files /index.html =404;
  }

  # API under random WebBasePath, for example /abc123/api/health -> /api/health
  location ~ ^/[^/]+/api/(.*)$ {
    proxy_pass http://zxy-panel-api:8088/api/$1;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Subscription under random WebBasePath, for example /abc123/sub/xxx -> /sub/xxx
  location ~ ^/[^/]+/sub/(.*)$ {
    proxy_pass http://zxy-panel-api:8088/sub/$1;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Short share QR under random WebBasePath, for example /abc123/s/token/node -> /s/token/node
  location ~ ^/[^/]+/s/(.*)$ {
    proxy_pass http://zxy-panel-api:8088/s/$1;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~ ^/[^/]+/assets/(.*)$ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files /assets/$1 =404;
  }

  location /api/ {
    proxy_pass http://zxy-panel-api:8088/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /sub/ {
    proxy_pass http://zxy-panel-api:8088/sub/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /s/ {
    proxy_pass http://zxy-panel-api:8088/s/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  # Vue history mode under random WebBasePath.
  location ~ ^/[^/]+/(.*)$ {
    try_files /$1 /index.html;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
